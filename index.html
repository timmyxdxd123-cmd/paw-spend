<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paw Spend">
<meta name="theme-color" content="#0f0f11">
<link rel="manifest" href="manifest.json">
<title>Paw Spend</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f11; --surface:#17171a; --s2:#1e1e23; --s3:#242429;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#f0ede8; --muted:rgba(240,237,232,0.45); --hint:rgba(240,237,232,0.2);
  --accent:#c8b89a; --green:#7e9e8c; --warm:#9e8c7e; --purple:#8c7e9e;
  --danger:#e07070;
  --c-vitam:#c8b89a; --c-food:#7e9e8c; --c-litter:#9e8c7e; --c-misc:#8c7e9e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overscroll-behavior:none}
.app{height:100svh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{padding:env(safe-area-inset-top,44px) 20px 0;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px}
.logo{font-family:'DM Serif Display',serif;font-size:24px;letter-spacing:-0.5px}
.logo em{color:var(--accent);font-style:italic}
.month-pill{font-size:11px;font-weight:500;color:var(--muted);background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;letter-spacing:0.3px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px;padding-bottom:calc(env(safe-area-inset-bottom,20px) + 82px)}
.scroll::-webkit-scrollbar{display:none}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:12px}
.card-pad{padding:18px 18px}

/* HERO */
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:18px}
.hero-label{font-size:10px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.hero-amount{font-family:'DM Serif Display',serif;font-size:46px;letter-spacing:-1.5px;line-height:1;color:var(--text)}
.hero-sub{font-size:12px;color:var(--muted);margin-top:5px}

/* RING */
.ring-wrap{position:relative;width:78px;height:78px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:15px;font-weight:500;color:var(--text)}
.ring-sub{font-size:9px;color:var(--muted);letter-spacing:0.3px;margin-top:1px}

/* BADGES */
.badge-row{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:5px 11px;border-radius:12px;white-space:nowrap}
.badge-spent{background:rgba(126,158,140,0.15);color:var(--green)}
.badge-remaining{background:rgba(200,184,154,0.12);color:var(--accent)}
.badge-items{background:rgba(255,255,255,0.06);color:var(--muted)}

/* STACKED BAR */
.bar-track{height:10px;background:var(--s2);border-radius:10px;overflow:hidden;display:flex;margin-bottom:11px;gap:2px}
.bar-seg{height:100%;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.bar-seg:first-child{border-radius:10px 0 0 10px}
.bar-seg:last-child{border-radius:0 10px 10px 0}
.bar-legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-amt{color:var(--hint);margin-left:2px}

/* CHART */
.section-title{font-size:10px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.chart-bars{display:flex;flex-direction:column;gap:8px}
.chart-row{display:flex;align-items:center;gap:10px}
.chart-name{font-size:11px;color:var(--muted);width:76px;flex-shrink:0;text-align:right;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-wrap{flex:1;height:24px;background:var(--s2);border-radius:6px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;justify-content:flex-end;transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1);min-width:4px;position:relative}
.chart-bar-val{font-size:10px;font-weight:500;color:rgba(255,255,255,0.75);white-space:nowrap}
.chart-mo{font-size:10px;color:var(--hint);width:42px;text-align:right;flex-shrink:0}

/* DUE BADGE */
.due-badge{font-size:9px;font-weight:500;padding:2px 6px;border-radius:6px;flex-shrink:0;white-space:nowrap}
.due-soon{background:rgba(200,184,154,0.18);color:var(--accent)}
.due-ok{background:rgba(126,158,140,0.15);color:var(--green)}
.due-overdue{background:rgba(224,112,112,0.15);color:var(--danger)}

/* LIST */
.list-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.reset-btn{font-size:11px;color:var(--hint);background:none;border:1px solid var(--border);border-radius:10px;padding:5px 11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.reset-btn:active{opacity:.6}

.item{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);gap:11px;transition:opacity .2s,background .15s;cursor:pointer;-webkit-user-select:none;user-select:none}
.item:last-child{border-bottom:none}
.item.done{opacity:.32}
.item:active{background:rgba(255,255,255,0.025)}

.check{width:23px;height:23px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:var(--s2)}
.check.on{background:var(--green);border-color:var(--green)}
.check svg{display:none}
.check.on svg{display:block}

.item-body{flex:1;min-width:0}
.item-name{font-size:14px;color:var(--text);margin-bottom:2px}
.item.done .item-name{text-decoration:line-through}
.item-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center}

.cat-tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:8px;flex-shrink:0}

.item-right{text-align:right;flex-shrink:0;cursor:pointer;padding:4px 0 4px 4px}
.item-price{font-size:15px;font-weight:500;font-family:'DM Serif Display',serif;color:var(--text)}
.item-date{font-size:10px;color:var(--hint);margin-top:2px}
.item-date.set{color:var(--muted)}

/* MISC */
.misc-section{padding:14px 16px}
.misc-row{display:flex;gap:7px;margin-bottom:10px}
.misc-input,.misc-price-input{background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s}
.misc-input{flex:1}
.misc-price-input{width:76px}
.misc-input:focus,.misc-price-input:focus{border-color:var(--border2)}
.misc-input::placeholder,.misc-price-input::placeholder{color:var(--hint)}
.misc-add{background:var(--accent);color:#0f0f11;border:none;border-radius:10px;padding:0 16px;font-size:22px;font-weight:300;cursor:pointer;transition:opacity .15s;font-family:'DM Sans',sans-serif}
.misc-add:active{opacity:.7}

.misc-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--border);cursor:pointer;-webkit-user-select:none}
.misc-item.done{opacity:.35}
.misc-item-name{flex:1;font-size:13px;color:var(--text)}
.misc-item.done .misc-item-name{text-decoration:line-through}
.misc-item-price{font-size:13px;color:var(--muted)}
.misc-remove{background:none;border:none;color:var(--hint);font-size:20px;padding:0 2px;cursor:pointer;line-height:1;transition:color .15s}
.misc-remove:active{color:var(--danger)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-bottom:none;border-radius:24px 24px 0 0;width:100%;padding:20px 20px calc(env(safe-area-inset-bottom,16px) + 16px);transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 20px}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.modal-date{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px 16px;margin-bottom:12px;-webkit-appearance:none}
.modal-next{font-size:12px;color:var(--muted);margin-bottom:16px;padding:10px 14px;background:var(--s2);border-radius:10px;border:1px solid var(--border);display:none}
.modal-next.show{display:block}
.modal-done{width:100%;background:var(--accent);color:#0f0f11;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:15px;cursor:pointer;transition:opacity .15s}
.modal-done:active{opacity:.8}

/* TABBAR */
.tabbar{flex-shrink:0;background:rgba(15,15,17,0.9);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,8px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;cursor:pointer;-webkit-user-select:none;transition:opacity .15s}
.tab:active{opacity:.5}
.tab-icon{font-size:21px;line-height:1}
.tab-label{font-size:10px;letter-spacing:0.2px;color:var(--muted);transition:color .2s}
.tab.active .tab-label{color:var(--accent)}

/* VIEWS */
.view{display:none}
.view.active{display:block}

/* EMPTY */
.empty{padding:28px 20px;text-align:center;font-size:13px;color:var(--hint)}

@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation:up .35s ease both}
.card:nth-child(2){animation:up .35s .06s ease both}
.card:nth-child(3){animation:up .35s .12s ease both}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-inner">
    <div class="logo">Paw <em>Spend</em></div>
    <div class="month-pill" id="month-label"></div>
  </div>
</div>

<div class="scroll">

  <!-- OVERVIEW -->
  <div class="view active" id="view-overview">

    <div class="card card-pad">
      <div class="hero-grid">
        <div>
          <div class="hero-label">Monthly Estimate</div>
          <div class="hero-amount" id="hero-amount">$0</div>
          <div class="hero-sub" id="hero-sub"></div>
        </div>
        <div class="ring-wrap">
          <svg width="78" height="78" viewBox="0 0 78 78">
            <circle cx="39" cy="39" r="33" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="7"/>
            <circle id="ring-arc" cx="39" cy="39" r="33" fill="none" stroke="var(--green)" stroke-width="7"
              stroke-linecap="round" stroke-dasharray="207.3" stroke-dashoffset="207.3"
              style="transition:stroke-dashoffset .8s cubic-bezier(0.34,1.2,0.64,1)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-sub">Ordered</div>
          </div>
        </div>
      </div>

      <div class="badge-row">
        <div class="badge badge-spent" id="badge-spent">$0 ordered</div>
        <div class="badge badge-remaining" id="badge-remaining">$0 left</div>
        <div class="badge badge-items" id="badge-items">0 items</div>
      </div>

      <div class="bar-track" id="bar-track"></div>
      <div class="bar-legend" id="bar-legend"></div>
    </div>

    <div class="card card-pad">
      <div class="section-title">Spend Breakdown</div>
      <div class="chart-bars" id="chart-bars"></div>
    </div>

  </div>

  <!-- ORDERS -->
  <div class="view" id="view-orders">

    <div class="card">
      <div class="list-header">
        <div class="section-title" style="margin:0">Recurring Orders</div>
        <button class="reset-btn" onclick="resetChecks()">Reset All</button>
      </div>
      <div id="items-list"></div>
    </div>

    <div class="card">
      <div class="list-header">
        <div class="section-title" style="margin:0">Misc & Treats</div>
      </div>
      <div class="misc-section">
        <div class="misc-row">
          <input class="misc-input" id="misc-name" placeholder="Item name" />
          <input class="misc-price-input" id="misc-price" type="number" placeholder="$0.00" step="0.01" min="0" />
          <button class="misc-add" onclick="addMisc()">+</button>
        </div>
        <div id="misc-list"></div>
        <div class="empty" id="misc-empty" style="display:none">No misc items yet</div>
      </div>
    </div>

  </div>

</div>

<!-- DATE MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub">When did you last order this?</div>
    <input class="modal-date" type="date" id="modal-date" onchange="previewNext()" />
    <div class="modal-next" id="modal-next"></div>
    <button class="modal-done" onclick="saveModal()">Save Date</button>
  </div>
</div>

<!-- TABBAR -->
<div class="tabbar">
  <div class="tab active" id="tab-overview" onclick="switchTab('overview')">
    <div class="tab-icon">📊</div>
    <div class="tab-label">Overview</div>
  </div>
  <div class="tab" id="tab-orders" onclick="switchTab('orders')">
    <div class="tab-icon">🛒</div>
    <div class="tab-label">Orders</div>
  </div>
</div>

</div>
<script>
const ITEMS = [
  {id:1,name:"Multivitamins",        price:16.14,freq:"Every 2 weeks",days:14, mult:2,   cat:"vitam"},
  {id:2,name:"Immune Vitamins",      price:15.72,freq:"Every 2 weeks",days:14, mult:2,   cat:"vitam"},
  {id:3,name:"Gut Health Vitamins",  price:12.22,freq:"Every 2 weeks",days:14, mult:2,   cat:"vitam"},
  {id:4,name:"UTI Vitamins",         price:15.72,freq:"Every 2 weeks",days:14, mult:2,   cat:"vitam"},
  {id:5,name:"Nulo Dry Food",        price:17.99,freq:"Monthly",      days:30, mult:1,   cat:"food"},
  {id:6,name:"Sheba Wet Food",       price:49.98,freq:"Monthly",      days:30, mult:1,   cat:"food"},
  {id:7,name:"Cat Litter",           price:20.28,freq:"Every 3 weeks",days:21, mult:4/3, cat:"litter"},
];

const CATS = {
  vitam: {label:"Vitamins", color:"#c8b89a"},
  food:  {label:"Food",     color:"#7e9e8c"},
  litter:{label:"Litter",   color:"#9e8c7e"},
  misc:  {label:"Misc",     color:"#8c7e9e"},
};

let state = {checked:{}, dates:{}, misc:[]};
let modalId = null;

function load(){try{const s=localStorage.getItem('pawspend3');if(s)state=JSON.parse(s)}catch(e){}}
function save(){try{localStorage.setItem('pawspend3',JSON.stringify(state))}catch(e){}}

function mo(item){return item.price * item.mult}

function dueInfo(item){
  const d = state.dates[item.id];
  if(!d) return null;
  const last = new Date(d);
  const next = new Date(last); next.setDate(next.getDate() + item.days);
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((next - today) / 86400000);
  return {next, diff};
}

function totals(){
  const base = ITEMS.reduce((s,i)=>s+mo(i),0);
  const miscT = state.misc.reduce((s,m)=>s+m.price,0);
  const total = base + miscT;
  const spent = ITEMS.filter(i=>state.checked[i.id]).reduce((s,i)=>s+i.price,0)
    + state.misc.filter(m=>m.checked).reduce((s,m)=>s+m.price,0);
  const catT = {};
  ITEMS.forEach(i=>{catT[i.cat]=(catT[i.cat]||0)+mo(i)});
  catT.misc = miscT;
  return {total, spent, remaining:total-spent, catT};
}

const CIRC = 2 * Math.PI * 33;

function renderOverview(){
  const {total, spent, remaining, catT} = totals();
  const miscT = state.misc.reduce((s,m)=>s+m.price,0);
  const checkedCount = Object.values(state.checked).filter(Boolean).length
    + state.misc.filter(m=>m.checked).length;
  const totalItems = ITEMS.length + state.misc.length;

  document.getElementById('hero-amount').textContent = '$' + total.toFixed(2);
  document.getElementById('hero-sub').textContent = 'Estimated monthly pet spend';
  document.getElementById('badge-spent').textContent = '$' + spent.toFixed(2) + ' ordered';
  document.getElementById('badge-remaining').textContent = '$' + Math.max(0,remaining).toFixed(2) + ' remaining';
  document.getElementById('badge-items').textContent = checkedCount + ' of ' + totalItems + ' done';

  const pct = total > 0 ? Math.min(100, (spent/total)*100) : 0;
  document.getElementById('ring-pct').textContent = Math.round(pct) + '%';
  document.getElementById('ring-arc').style.strokeDashoffset = CIRC * (1 - pct/100);

  // stacked bar
  const track = document.getElementById('bar-track');
  const legend = document.getElementById('bar-legend');
  track.innerHTML = ''; legend.innerHTML = '';
  Object.entries(catT).forEach(([cat,val])=>{
    if(val<=0) return;
    const pct = (val/total*100).toFixed(1);
    const seg = document.createElement('div');
    seg.className = 'bar-seg';
    seg.style.width = pct+'%';
    seg.style.background = CATS[cat].color;
    track.appendChild(seg);
    const li = document.createElement('div');
    li.className = 'legend-item';
    li.innerHTML = `<div class="legend-dot" style="background:${CATS[cat].color}"></div>${CATS[cat].label}<span class="legend-amt">$${val.toFixed(0)}</span>`;
    legend.appendChild(li);
  });

  // chart
  const chartBars = document.getElementById('chart-bars');
  chartBars.innerHTML = '';
  const allItems = [
    ...ITEMS.map(i=>({name:i.name, price:i.price, mo:mo(i), cat:i.cat, done:!!state.checked[i.id]})),
    ...state.misc.map(m=>({name:m.name, price:m.price, mo:m.price, cat:'misc', done:m.checked}))
  ];
  const maxMo = Math.max(...allItems.map(i=>i.mo), 1);

  allItems.forEach(i=>{
    const pct = (i.mo / (maxMo * 1.08) * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'chart-row';
    const shortName = i.name.length > 13 ? i.name.slice(0,12)+'…' : i.name;
    row.innerHTML = `
      <div class="chart-name" title="${i.name}">${shortName}</div>
      <div class="chart-bar-wrap">
        <div class="chart-bar-fill" style="width:${pct}%;background:${CATS[i.cat].color};opacity:${i.done?0.3:1}">
          <span class="chart-bar-val">$${i.price.toFixed(2)}</span>
        </div>
      </div>
      <div class="chart-mo">$${i.mo.toFixed(0)}/mo</div>
    `;
    chartBars.appendChild(row);
  });
}

function renderOrders(){
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  ITEMS.forEach(i=>{
    const done = !!state.checked[i.id];
    const info = dueInfo(i);
    let dateStr = 'Tap price to log date';
    let dueHtml = '';
    if(info){
      const d = state.dates[i.id];
      dateStr = 'Last: ' + new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      if(info.diff < 0){
        dueHtml = `<span class="due-badge due-overdue">${Math.abs(info.diff)}d overdue</span>`;
      } else if(info.diff <= 4){
        dueHtml = `<span class="due-badge due-soon">Due in ${info.diff}d</span>`;
      } else {
        dueHtml = `<span class="due-badge due-ok">${info.diff}d left</span>`;
      }
    }
    const div = document.createElement('div');
    div.className = 'item' + (done?' done':'');
    div.innerHTML = `
      <div class="check${done?' on':''}">
        <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
          <path d="M1 3.5L4 6.5L10 1" stroke="#0f0f11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item-body">
        <div class="item-name">${i.name}</div>
        <div class="item-meta">
          <span>${i.freq}</span>
          ${dueHtml}
        </div>
      </div>
      <div class="cat-tag" style="background:${CATS[i.cat].color}20;color:${CATS[i.cat].color}">${CATS[i.cat].label}</div>
      <div class="item-right" onclick="openModal(event,${i.id})">
        <div class="item-price">$${i.price.toFixed(2)}</div>
        <div class="item-date${info?' set':''}">${dateStr}</div>
      </div>
    `;
    div.addEventListener('click', e=>{
      if(e.target.closest('.item-right')) return;
      state.checked[i.id] = !state.checked[i.id];
      save(); render();
    });
    list.appendChild(div);
  });

  const miscList = document.getElementById('misc-list');
  miscList.innerHTML = '';
  document.getElementById('misc-empty').style.display = state.misc.length ? 'none' : 'block';
  state.misc.forEach((m,idx)=>{
    const div = document.createElement('div');
    div.className = 'misc-item'+(m.checked?' done':'');
    div.innerHTML = `
      <div class="check${m.checked?' on':''}">
        <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
          <path d="M1 3.5L4 6.5L10 1" stroke="#0f0f11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="misc-item-name">${m.name}</div>
      <div class="misc-item-price">$${m.price.toFixed(2)}</div>
      <button class="misc-remove" onclick="removeMisc(event,${idx})">×</button>
    `;
    div.addEventListener('click', e=>{
      if(e.target.closest('.misc-remove')) return;
      state.misc[idx].checked = !state.misc[idx].checked;
      save(); render();
    });
    miscList.appendChild(div);
  });
}

function render(){renderOverview(); renderOrders();}

let modalItem = null;
function openModal(e, id){
  e.stopPropagation();
  modalId = id;
  modalItem = ITEMS.find(i=>i.id===id);
  document.getElementById('modal-title').textContent = modalItem.name;
  document.getElementById('modal-date').value = state.dates[id]||'';
  document.getElementById('modal-next').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
  previewNext();
}
function closeModal(e){
  if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open');
}
function previewNext(){
  const val = document.getElementById('modal-date').value;
  const el = document.getElementById('modal-next');
  if(!val||!modalItem){el.classList.remove('show');return}
  const next = new Date(val);
  next.setDate(next.getDate()+modalItem.days);
  el.textContent = 'Next order due: ' + next.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  el.classList.add('show');
}
function saveModal(){
  const val = document.getElementById('modal-date').value;
  if(modalId && val){state.dates[modalId]=val; save(); render();}
  document.getElementById('overlay').classList.remove('open');
}

function addMisc(){
  const name = document.getElementById('misc-name').value.trim();
  const price = parseFloat(document.getElementById('misc-price').value);
  if(!name||isNaN(price)||price<=0) return;
  const capName = name.charAt(0).toUpperCase()+name.slice(1);
  state.misc.push({name:capName, price, checked:false});
  document.getElementById('misc-name').value='';
  document.getElementById('misc-price').value='';
  save(); render();
}
function removeMisc(e, idx){
  e.stopPropagation();
  state.misc.splice(idx,1);
  save(); render();
}
function resetChecks(){
  if(!confirm('Reset all check-offs?')) return;
  state.checked={};
  save(); render();
}
function switchTab(tab){
  ['overview','orders'].forEach(t=>{
    document.getElementById('view-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}

document.getElementById('month-label').textContent = new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
load(); render();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
