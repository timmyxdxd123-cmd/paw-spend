<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Void Spend">
<meta name="theme-color" content="#08080b">
<link rel="manifest" href="manifest.json">
<title>Void Spend Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080b;--surface:#101014;--s2:#18181e;--s3:#202028;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f2ede6;--muted:rgba(242,237,230,0.5);--hint:rgba(242,237,230,0.22);
  /* Vibrant palette */
  --accent:#f0c070;--green:#4ecb8d;--blue:#5ab4f5;--purple:#b07ef5;
  --danger:#ff6b6b;--warn:#f5a623;--pink:#f06292;
  --c-vitam:#f0c070;--c-food:#4ecb8d;--c-litter:#5ab4f5;--c-misc:#b07ef5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overscroll-behavior:none;font-size:15px;line-height:1.5}
.app{height:100svh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{padding:env(safe-area-inset-top,44px) 18px 0;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:13px}
.logo{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-0.3px;color:var(--text)}
.logo em{color:var(--accent);font-style:italic}
.month-pill{font-size:11px;font-weight:500;color:var(--muted);background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 13px;padding-bottom:calc(env(safe-area-inset-bottom,20px) + 80px)}
.scroll::-webkit-scrollbar{display:none}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:10px}
.card-pad{padding:16px}

/* LOW STOCK BANNER */
.low-banner{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);border-radius:14px;padding:12px 15px;margin-bottom:10px;display:none}
.low-banner.show{display:flex;gap:10px;align-items:flex-start}
.low-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.low-title{font-size:13px;font-weight:600;color:var(--warn);margin-bottom:3px}
.low-list{font-size:12px;color:rgba(245,166,35,0.75);line-height:1.7}

/* HERO */
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:14px}
.hero-label{font-size:10px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.hero-amount{font-family:'DM Serif Display',serif;font-size:44px;letter-spacing:-1.5px;line-height:1;color:var(--text)}
.hero-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* RING */
.ring-wrap{position:relative;width:76px;height:76px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:15px;font-weight:600;color:var(--text)}
.ring-sub{font-size:9px;color:var(--muted);letter-spacing:0.3px;margin-top:1px}

/* BADGES */
.badge-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:600;padding:5px 11px;border-radius:11px;white-space:nowrap;line-height:1}
.badge-spent{background:rgba(78,203,141,0.15);color:var(--green)}
.badge-remaining{background:rgba(240,192,112,0.13);color:var(--accent)}
.badge-items{background:rgba(255,255,255,0.07);color:var(--muted)}

/* STACKED BAR */
.bar-track{height:10px;background:var(--s2);border-radius:10px;overflow:hidden;display:flex;margin-bottom:10px;gap:2px}
.bar-seg{height:100%;transition:width .7s cubic-bezier(0.34,1.56,0.64,1)}
.bar-seg:first-child{border-radius:10px 0 0 10px}
.bar-seg:last-child{border-radius:0 10px 10px 0}
.bar-legend{display:flex;gap:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-amt{color:rgba(242,237,230,0.3);margin-left:1px}

/* SECTION TITLE */
.section-title{font-size:10px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;font-weight:400}

/* CHART ACCORDION */
.chart-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-user-select:none;padding:14px 16px;border-top:1px solid var(--border)}
.chart-toggle-label{font-size:10px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase}
.chart-caret{font-size:13px;color:var(--muted);transition:transform .25s}
.chart-caret.open{transform:rotate(180deg)}
.chart-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(0.4,0,0.2,1)}
.chart-body.open{max-height:700px}
.chart-inner{padding:0 16px 16px}
.chart-bars{display:flex;flex-direction:column;gap:9px}
.chart-row{display:flex;align-items:center;gap:9px}
.chart-name{font-size:11px;color:var(--muted);width:82px;flex-shrink:0;text-align:right;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chart-bar-wrap{flex:1;height:24px;background:var(--s2);border-radius:6px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;justify-content:flex-end;transition:width .7s cubic-bezier(0.34,1.56,0.64,1);min-width:4px}
.chart-bar-val{font-size:10px;font-weight:600;color:rgba(0,0,0,0.75);white-space:nowrap}
.chart-mo{font-size:10px;color:var(--hint);width:44px;text-align:right;flex-shrink:0}

/* LIST */
.list-header{padding:13px 16px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.reset-btn{font-size:11px;color:var(--hint);background:none;border:1px solid var(--border);border-radius:9px;padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.reset-btn:active{opacity:.5}

.item{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border);gap:11px;transition:opacity .2s,background .15s;cursor:pointer;-webkit-user-select:none}
.item:last-child{border-bottom:none}
.item.done{opacity:.28}
.item:active{background:rgba(255,255,255,0.03)}

.check{width:23px;height:23px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:var(--s2)}
.check.on{background:var(--green);border-color:var(--green)}
.check svg{display:none}
.check.on svg{display:block}

.item-body{flex:1;min-width:0}
.item-name{font-size:14px;color:var(--text);margin-bottom:3px;font-weight:400}
.item.done .item-name{text-decoration:line-through;color:var(--muted)}
.item-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* DATE CHIP — vibrant highlight */
.date-chip{display:inline-flex;flex-direction:column;align-items:flex-end;background:var(--s3);border:1px solid var(--border2);border-radius:10px;padding:7px 10px;cursor:pointer;-webkit-user-select:none;transition:border-color .2s,background .2s;flex-shrink:0;min-width:90px}
.date-chip:active{border-color:var(--accent);background:rgba(240,192,112,0.08)}
.date-chip-price{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);line-height:1;text-align:right}
.date-chip-date{font-size:10px;font-weight:600;color:var(--accent);margin-top:2px;white-space:nowrap}
.date-chip-unset{font-size:10px;color:var(--hint);margin-top:2px}

.due-badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:5px;flex-shrink:0;white-space:nowrap}
.due-soon{background:rgba(240,192,112,0.2);color:var(--accent)}
.due-ok{background:rgba(78,203,141,0.15);color:var(--green)}
.due-overdue{background:rgba(255,107,107,0.18);color:var(--danger)}
.due-low{background:rgba(245,166,35,0.18);color:var(--warn)}

.cat-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:7px;flex-shrink:0;white-space:nowrap}

/* MISC */
.misc-section{padding:12px 15px}
.misc-row{display:flex;gap:6px;margin-bottom:9px}
.misc-input,.misc-price-input{background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s}
.misc-input{flex:1}
.misc-price-input{width:74px}
.misc-input:focus,.misc-price-input:focus{border-color:var(--border2)}
.misc-input::placeholder,.misc-price-input::placeholder{color:var(--hint)}
.misc-add{background:var(--accent);color:#08080b;border:none;border-radius:9px;padding:0 15px;font-size:22px;font-weight:300;cursor:pointer;transition:opacity .15s;font-family:'DM Sans',sans-serif;line-height:1}
.misc-add:active{opacity:.7}
.misc-item{display:flex;align-items:center;gap:9px;padding:9px 0;border-top:1px solid var(--border);cursor:pointer;-webkit-user-select:none}
.misc-item.done{opacity:.3}
.misc-item-name{flex:1;font-size:13px;color:var(--text)}
.misc-item.done .misc-item-name{text-decoration:line-through}
.misc-item-price{font-size:13px;color:var(--muted)}
.misc-remove{background:none;border:none;color:var(--hint);font-size:20px;padding:0 2px;cursor:pointer;line-height:1;transition:color .15s}
.misc-remove:active{color:var(--danger)}
.empty{padding:24px 18px;text-align:center;font-size:13px;color:var(--hint)}

/* HISTORY */
.history-controls{display:flex;flex-direction:column;gap:0;flex-shrink:0}
.filter-row{display:flex;gap:6px;padding:10px 13px 6px;overflow-x:auto;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.sort-row{display:flex;gap:6px;padding:0 13px 8px;align-items:center}
.sort-label{font-size:11px;color:var(--hint);flex-shrink:0}
.sort-btn{font-size:11px;font-weight:500;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);cursor:pointer;white-space:nowrap;-webkit-user-select:none;transition:all .15s;flex-shrink:0}
.sort-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.filter-btn{font-size:11px;font-weight:500;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);cursor:pointer;white-space:nowrap;-webkit-user-select:none;transition:all .15s;flex-shrink:0}
.filter-btn.active{background:var(--accent);color:#08080b;border-color:var(--accent)}
.history-list{display:flex;flex-direction:column;gap:8px;padding:4px 13px 8px}
.history-group{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}

/* MONTH GROUP — new style */
.month-group{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:0}
.month-group-header{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--s2)}
.month-group-name{font-size:14px;font-weight:600;color:var(--text)}
.month-group-total{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent)}

.history-group-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--s2)}
.history-group-name{font-size:13px;font-weight:500;color:var(--text)}
.history-group-cat{font-size:9px;font-weight:600;padding:2px 7px;border-radius:7px}
.history-entry{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.history-entry:last-child{border-bottom:none}
.history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.history-date{font-size:13px;color:var(--text);flex:1;font-weight:400}
.history-price{font-size:13px;font-weight:600;color:var(--accent)}
.history-del{background:none;border:none;color:var(--hint);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s}
.history-del:active{color:var(--danger)}
.history-empty{padding:40px 20px;text-align:center;font-size:13px;color:var(--hint);line-height:1.9}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-end;z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border2);border-bottom:none;border-radius:24px 24px 0 0;width:100%;padding:20px 18px calc(env(safe-area-inset-bottom,16px)+16px);transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:4px;margin:0 auto 18px}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:2px;color:var(--text)}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.modal-field-label{font-size:11px;letter-spacing:0.8px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;font-weight:500}
.modal-date{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:14px 16px;-webkit-appearance:none;outline:none;transition:border-color .2s}
.modal-date:focus{border-color:var(--border2)}
.modal-price-row{display:flex;gap:10px;align-items:center;margin:12px 0 6px}
.modal-price-label{font-size:11px;letter-spacing:0.8px;color:var(--muted);text-transform:uppercase;font-weight:500;flex-shrink:0}
.modal-price-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:12px;color:var(--accent);font-family:'DM Serif Display',serif;font-size:22px;padding:12px 16px;-webkit-appearance:none;outline:none;transition:border-color .2s}
.modal-price-input:focus{border-color:var(--accent)}
.modal-next{font-size:12px;color:var(--muted);margin-bottom:14px;padding:10px 14px;background:var(--s2);border-radius:10px;border:1px solid var(--border);display:none}
.modal-next.show{display:block}
.modal-done{width:100%;background:var(--accent);color:#08080b;border:none;border-radius:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:15px;cursor:pointer;transition:opacity .15s;margin-top:6px}
.modal-done:active{opacity:.8}

/* TABBAR */
.tabbar{flex-shrink:0;background:rgba(8,8,11,0.93);-webkit-backdrop-filter:blur(28px);backdrop-filter:blur(28px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,8px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 7px;cursor:pointer;-webkit-user-select:none;transition:opacity .15s}
.tab:active{opacity:.5}
.tab-icon{font-size:20px;line-height:1}
.tab-label{font-size:10px;color:var(--hint);transition:color .2s;letter-spacing:0.1px}
.tab.active .tab-label{color:var(--accent)}

.view{display:none}
.view.active{display:block}

@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation:up .3s ease both}
.card:nth-child(2){animation:up .3s .05s ease both}
.card:nth-child(3){animation:up .3s .1s ease both}
.low-banner{animation:up .3s ease both}
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-inner">
    <div class="logo">Void <em>Spend Tracker</em></div>
    <div class="month-pill" id="month-label"></div>
  </div>
</div>

<div class="scroll" id="main-scroll">

  <!-- OVERVIEW -->
  <div class="view active" id="view-overview">
    <div class="low-banner" id="low-banner">
      <div class="low-icon">⚠️</div>
      <div>
        <div class="low-title">Potential Low Stock</div>
        <div class="low-list" id="low-list"></div>
      </div>
    </div>

    <div class="card card-pad">
      <div class="hero-grid">
        <div>
          <div class="hero-label">Monthly Estimate</div>
          <div class="hero-amount" id="hero-amount">$0</div>
          <div class="hero-sub" id="hero-sub"></div>
        </div>
        <div class="ring-wrap">
          <svg width="76" height="76" viewBox="0 0 76 76">
            <circle cx="38" cy="38" r="32" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="7"/>
            <circle id="ring-arc" cx="38" cy="38" r="32" fill="none" stroke="var(--green)" stroke-width="7"
              stroke-linecap="round" stroke-dasharray="201.1" stroke-dashoffset="201.1"
              style="transition:stroke-dashoffset .8s cubic-bezier(0.34,1.2,0.64,1)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-pct" id="ring-pct">0%</div>
            <div class="ring-sub">This Cycle</div>
          </div>
        </div>
      </div>
      <div class="badge-row">
        <div class="badge badge-spent" id="badge-spent">$0 ordered</div>
        <div class="badge badge-remaining" id="badge-remaining">$0 left</div>
        <div class="badge badge-items" id="badge-items">0 items</div>
      </div>
      <div class="bar-track" id="bar-track"></div>
      <div class="bar-legend" id="bar-legend"></div>
    </div>

    <div class="card">
      <div class="chart-toggle" id="chart-toggle" onclick="toggleChart()">
        <span class="chart-toggle-label">Spend Breakdown</span>
        <span class="chart-caret" id="chart-caret">▾</span>
      </div>
      <div class="chart-body" id="chart-body">
        <div class="chart-inner">
          <div class="chart-bars" id="chart-bars"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="view" id="view-orders">
    <div class="card">
      <div class="list-header">
        <div class="section-title">Recurring Orders</div>
        <button class="reset-btn" onclick="resetChecks()">Reset All</button>
      </div>
      <div id="items-list"></div>
    </div>
    <div class="card">
      <div class="list-header">
        <div class="section-title">Misc & Treats</div>
      </div>
      <div class="misc-section">
        <div class="misc-row">
          <input class="misc-input" id="misc-name" placeholder="Item name" />
          <input class="misc-price-input" id="misc-price" type="number" placeholder="$0.00" step="0.01" min="0" />
          <button class="misc-add" onclick="addMisc()">+</button>
        </div>
        <div id="misc-list"></div>
        <div class="empty" id="misc-empty">No misc items yet</div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="history-list" id="history-list"></div>
  </div>

</div>

<!-- HISTORY CONTROLS -->
<div class="history-controls" id="history-controls" style="display:none">
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('vitam',this)">Vitamins</button>
    <button class="filter-btn" onclick="setFilter('food',this)">Food</button>
    <button class="filter-btn" onclick="setFilter('litter',this)">Litter</button>
    <button class="filter-btn" onclick="setFilter('misc',this)">Misc</button>
  </div>
  <div class="sort-row">
    <span class="sort-label">Sort:</span>
    <button class="sort-btn active" id="sort-item" onclick="setSort('item',this)">By Item</button>
    <button class="sort-btn" id="sort-month" onclick="setSort('month',this)">By Month</button>
  </div>
</div>

<!-- DATE + PRICE MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub">Log a purchase — update price if it changed</div>
    <div class="modal-field-label">Purchase Date</div>
    <input class="modal-date" type="date" id="modal-date" onchange="previewNext()" />
    <div class="modal-price-row">
      <div class="modal-price-label">Price Paid</div>
      <input class="modal-price-input" type="number" id="modal-price" step="0.01" min="0" placeholder="0.00" />
    </div>
    <div class="modal-next" id="modal-next"></div>
    <button class="modal-done" onclick="saveModal()">Save Purchase</button>
  </div>
</div>

<!-- TABBAR -->
<div class="tabbar">
  <div class="tab active" id="tab-overview" onclick="switchTab('overview')">
    <div class="tab-icon">📊</div>
    <div class="tab-label">Overview</div>
  </div>
  <div class="tab" id="tab-orders" onclick="switchTab('orders')">
    <div class="tab-icon">🛒</div>
    <div class="tab-label">Orders</div>
  </div>
  <div class="tab" id="tab-history" onclick="switchTab('history')">
    <div class="tab-icon">📋</div>
    <div class="tab-label">History</div>
  </div>
</div>

</div>
<script>
const ITEMS=[
  {id:1,name:"Multivitamins",        price:16.14,freq:"Every 2 weeks",days:14,mult:2,   cat:"vitam"},
  {id:2,name:"Immune Vitamins",      price:15.72,freq:"Every 2 weeks",days:14,mult:2,   cat:"vitam"},
  {id:3,name:"Gut Health Vitamins",  price:12.22,freq:"Every 2 weeks",days:14,mult:2,   cat:"vitam"},
  {id:4,name:"UTI Vitamins",         price:15.72,freq:"Every 2 weeks",days:14,mult:2,   cat:"vitam"},
  {id:5,name:"Nulo Dry Food",        price:17.99,freq:"Monthly",      days:30,mult:1,   cat:"food"},
  {id:6,name:"Nulo Topper",          price:12.99,freq:"Monthly",      days:30,mult:1,   cat:"food"},
  {id:7,name:"Sheba Wet Food",       price:49.98,freq:"Monthly",      days:30,mult:1,   cat:"food"},
  {id:8,name:"Cat Litter",           price:20.28,freq:"Every 3 weeks",days:21,mult:4/3, cat:"litter"},
];

const CATS={
  vitam: {label:"Vitamins",color:"#f0c070"},
  food:  {label:"Food",    color:"#4ecb8d"},
  litter:{label:"Litter",  color:"#5ab4f5"},
  misc:  {label:"Misc",    color:"#b07ef5"},
};

// state.prices: overridden prices per item id
// state.history: [{itemId, name, cat, price, date}]
let state={checked:{},dates:{},prices:{},misc:[],history:[],chartOpen:false};
let modalId=null,modalItem=null,histFilter='all',histSort='item';

function load(){try{const s=localStorage.getItem('voidspend2');if(s)state=JSON.parse(s)}catch(e){}}
function save(){try{localStorage.setItem('voidspend2',JSON.stringify(state))}catch(e){}}

function itemPrice(item){return state.prices[item.id]??item.price}
function mo(item){return itemPrice(item)*item.mult}

function totals(){
  const base=ITEMS.reduce((s,i)=>s+mo(i),0);
  const miscT=state.misc.reduce((s,m)=>s+m.price,0);
  const total=base+miscT;
  const spent=ITEMS.filter(i=>state.checked[i.id]).reduce((s,i)=>s+itemPrice(i),0)
    +state.misc.filter(m=>m.checked).reduce((s,m)=>s+m.price,0);
  const totalItems=ITEMS.length+state.misc.length;
  const checkedItems=Object.values(state.checked).filter(Boolean).length+state.misc.filter(m=>m.checked).length;
  const catT={};
  ITEMS.forEach(i=>{catT[i.cat]=(catT[i.cat]||0)+mo(i)});
  catT.misc=miscT;
  return{total,spent,remaining:total-spent,catT,cyclePct:totalItems>0?(checkedItems/totalItems)*100:0,checkedItems,totalItems};
}

function dueInfo(item){
  const d=state.dates[item.id];
  if(!d)return null;
  const next=new Date(d);next.setDate(next.getDate()+item.days);
  const today=new Date();today.setHours(0,0,0,0);
  return{next,diff:Math.round((next-today)/86400000)};
}

function lowStockItems(){return ITEMS.filter(i=>{const info=dueInfo(i);return info&&info.diff<=3})}

const CIRC=2*Math.PI*32;

function renderOverview(){
  const{total,spent,remaining,catT,cyclePct,checkedItems,totalItems}=totals();
  document.getElementById('hero-amount').textContent='$'+total.toFixed(2);
  document.getElementById('hero-sub').textContent='Estimated monthly pet budget';
  document.getElementById('badge-spent').textContent='$'+spent.toFixed(2)+' ordered';
  document.getElementById('badge-remaining').textContent='$'+Math.max(0,remaining).toFixed(2)+' remaining';
  document.getElementById('badge-items').textContent=checkedItems+' of '+totalItems+' done';
  const pct=Math.min(100,cyclePct);
  document.getElementById('ring-pct').textContent=Math.round(pct)+'%';
  document.getElementById('ring-arc').style.strokeDashoffset=CIRC*(1-pct/100);

  const track=document.getElementById('bar-track');
  const legend=document.getElementById('bar-legend');
  track.innerHTML='';legend.innerHTML='';
  Object.entries(catT).forEach(([cat,val])=>{
    if(val<=0)return;
    const p=(val/total*100).toFixed(1);
    const seg=document.createElement('div');
    seg.className='bar-seg';seg.style.width=p+'%';seg.style.background=CATS[cat].color;
    track.appendChild(seg);
    const li=document.createElement('div');li.className='legend-item';
    li.innerHTML=`<div class="legend-dot" style="background:${CATS[cat].color}"></div>${CATS[cat].label}<span class="legend-amt">$${val.toFixed(0)}</span>`;
    legend.appendChild(li);
  });

  const low=lowStockItems();
  const banner=document.getElementById('low-banner');
  if(low.length){
    banner.classList.add('show');
    document.getElementById('low-list').innerHTML=low.map(i=>{
      const info=dueInfo(i);
      return info.diff<0?`${i.name} — overdue by ${Math.abs(info.diff)}d`:`${i.name} — due in ${info.diff}d`;
    }).join('<br>');
  }else{banner.classList.remove('show')}

  // chart
  const chartBars=document.getElementById('chart-bars');
  chartBars.innerHTML='';
  const allItems=[
    ...ITEMS.map(i=>({name:i.name,price:itemPrice(i),mo:mo(i),cat:i.cat,done:!!state.checked[i.id]})),
    ...state.misc.map(m=>({name:m.name,price:m.price,mo:m.price,cat:'misc',done:m.checked}))
  ];
  const maxMo=Math.max(...allItems.map(i=>i.mo),1);
  allItems.forEach(i=>{
    const p=(i.mo/(maxMo*1.08)*100).toFixed(1);
    const short=i.name.length>14?i.name.slice(0,13)+'…':i.name;
    const row=document.createElement('div');row.className='chart-row';
    row.innerHTML=`<div class="chart-name" title="${i.name}">${short}</div>
      <div class="chart-bar-wrap"><div class="chart-bar-fill" style="width:${p}%;background:${CATS[i.cat].color};opacity:${i.done?0.25:1}">
        <span class="chart-bar-val">$${i.price.toFixed(2)}</span></div></div>
      <div class="chart-mo">$${i.mo.toFixed(0)}/mo</div>`;
    chartBars.appendChild(row);
  });
}

function toggleChart(){
  state.chartOpen=!state.chartOpen;save();
  document.getElementById('chart-body').classList.toggle('open',state.chartOpen);
  document.getElementById('chart-caret').classList.toggle('open',state.chartOpen);
}

function renderOrders(){
  const list=document.getElementById('items-list');
  list.innerHTML='';
  ITEMS.forEach(i=>{
    const done=!!state.checked[i.id];
    const info=dueInfo(i);
    let dueHtml='';
    if(info){
      if(info.diff<0) dueHtml=`<span class="due-badge due-overdue">${Math.abs(info.diff)}d overdue</span>`;
      else if(info.diff<=3) dueHtml=`<span class="due-badge due-low">Due ${info.diff}d</span>`;
      else if(info.diff<=6) dueHtml=`<span class="due-badge due-soon">Due ${info.diff}d</span>`;
      else dueHtml=`<span class="due-badge due-ok">${info.diff}d left</span>`;
    }
    const lastDate=state.dates[i.id]
      ?new Date(state.dates[i.id]).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
      :null;
    const curPrice=itemPrice(i);
    const div=document.createElement('div');
    div.className='item'+(done?' done':'');
    div.innerHTML=`
      <div class="check${done?' on':''}">
        <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
          <path d="M1 3.5L4 6.5L10 1" stroke="#08080b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item-body">
        <div class="item-name">${i.name}</div>
        <div class="item-meta">
          <span>${i.freq}</span>
          <span class="cat-tag" style="background:${CATS[i.cat].color}22;color:${CATS[i.cat].color}">${CATS[i.cat].label}</span>
          ${dueHtml}
        </div>
      </div>
      <div class="date-chip" onclick="openModal(event,${i.id})">
        <div class="date-chip-price">$${curPrice.toFixed(2)}</div>
        ${lastDate
          ?`<div class="date-chip-date">📅 ${lastDate}</div>`
          :`<div class="date-chip-unset">Tap to log</div>`}
      </div>`;
    div.addEventListener('click',e=>{
      if(e.target.closest('.date-chip'))return;
      state.checked[i.id]=!state.checked[i.id];save();render();
    });
    list.appendChild(div);
  });

  const miscList=document.getElementById('misc-list');
  miscList.innerHTML='';
  document.getElementById('misc-empty').style.display=state.misc.length?'none':'block';
  state.misc.forEach((m,idx)=>{
    const div=document.createElement('div');
    div.className='misc-item'+(m.checked?' done':'');
    div.innerHTML=`
      <div class="check${m.checked?' on':''}">
        <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
          <path d="M1 3.5L4 6.5L10 1" stroke="#08080b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="misc-item-name">${m.name}</div>
      <div class="misc-item-price">$${m.price.toFixed(2)}</div>
      <button class="misc-remove" onclick="removeMisc(event,${idx})">×</button>`;
    div.addEventListener('click',e=>{
      if(e.target.closest('.misc-remove'))return;
      state.misc[idx].checked=!state.misc[idx].checked;save();render();
    });
    miscList.appendChild(div);
  });
}

/* ---- HISTORY ---- */
function renderHistory(){
  const hl=document.getElementById('history-list');
  hl.innerHTML='';
  const filtered=state.history.filter(e=>histFilter==='all'||e.cat===histFilter);
  if(!filtered.length){
    hl.innerHTML=`<div class="history-empty">No purchase history yet.<br>Log dates in the Orders tab<br>to start tracking here.</div>`;
    return;
  }

  if(histSort==='item'){
    // Group by item name
    const groups={};
    filtered.forEach(e=>{
      const key=e.itemId!=null?'item_'+e.itemId:'misc_'+e.name;
      if(!groups[key])groups[key]={name:e.name,cat:e.cat,entries:[]};
      groups[key].entries.push(e);
    });
    Object.values(groups).forEach(g=>{
      g.entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
      const grp=document.createElement('div');
      grp.className='history-group';
      grp.innerHTML=`<div class="history-group-header">
        <div class="history-group-name">${g.name}</div>
        <div class="history-group-cat" style="background:${CATS[g.cat].color}22;color:${CATS[g.cat].color}">${CATS[g.cat].label}</div>
      </div>`;
      g.entries.forEach(e=>{
        const row=buildHistoryRow(e,g.cat);
        grp.appendChild(row);
      });
      hl.appendChild(grp);
    });

  } else {
    // Group by month — key: "YYYY-MM"
    const months={};
    filtered.forEach(e=>{
      const key=e.date.slice(0,7);
      if(!months[key])months[key]={entries:[],total:0};
      months[key].entries.push(e);
      months[key].total+=(e.price||0);
    });
    // Sort months newest first
    Object.keys(months).sort((a,b)=>b.localeCompare(a)).forEach(mkey=>{
      const{entries,total}=months[mkey];
      const d=new Date(mkey+'-02');
      const label=d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
      const grp=document.createElement('div');
      grp.className='month-group';
      grp.innerHTML=`<div class="month-group-header">
        <div class="month-group-name">${label}</div>
        <div class="month-group-total">$${total.toFixed(2)}</div>
      </div>`;
      // Sort entries within month newest first
      entries.sort((a,b)=>new Date(b.date)-new Date(a.date));
      entries.forEach(e=>{
        const row=buildHistoryRow(e,e.cat);
        grp.appendChild(row);
      });
      hl.appendChild(grp);
    });
  }
}

function buildHistoryRow(e,cat){
  const row=document.createElement('div');
  row.className='history-entry';
  const d=new Date(e.date).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const showName=histSort==='month'?`<span style="flex:1;font-size:13px;color:var(--text)">${e.name}</span>`:'';
  row.innerHTML=`
    <div class="history-dot" style="background:${CATS[cat].color}"></div>
    <div class="history-date">${d}</div>
    ${showName}
    <div class="history-price">$${(e.price||0).toFixed(2)}</div>
    <button class="history-del" onclick="deleteHistory(event,'${e.date}',${e.itemId!=null?e.itemId:'null'},'${e.name.replace(/'/g,"\\'")}')" aria-label="Delete">×</button>`;
  return row;
}

function deleteHistory(e,date,itemId,name){
  e.stopPropagation();
  const id=itemId==='null'?null:Number(itemId);
  state.history=state.history.filter(h=>!(h.date===date&&(h.itemId===id||(h.itemId==null&&h.name===name))));
  save();renderHistory();
}

function setFilter(cat,btn){
  histFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}
function setSort(s,btn){
  histSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHistory();
}

function render(){renderOverview();renderOrders();renderHistory();}

/* ---- MODAL ---- */
function openModal(e,id){
  e.stopPropagation();
  modalId=id;
  modalItem=ITEMS.find(i=>i.id===id);
  document.getElementById('modal-title').textContent=modalItem.name;
  document.getElementById('modal-date').value=state.dates[id]||'';
  document.getElementById('modal-price').value=(state.prices[id]??modalItem.price).toFixed(2);
  document.getElementById('modal-next').classList.remove('show');
  document.getElementById('overlay').classList.add('open');
  previewNext();
}
function closeModal(e){
  if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');
}
function previewNext(){
  const val=document.getElementById('modal-date').value;
  const el=document.getElementById('modal-next');
  if(!val||!modalItem){el.classList.remove('show');return}
  const next=new Date(val);next.setDate(next.getDate()+modalItem.days);
  el.textContent='Next order due: '+next.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  el.classList.add('show');
}
function saveModal(){
  const val=document.getElementById('modal-date').value;
  const priceVal=parseFloat(document.getElementById('modal-price').value);
  if(!modalId||!val)return;

  // Update price override
  if(!isNaN(priceVal)&&priceVal>0){
    state.prices[modalId]=priceVal;
  }
  const usedPrice=(!isNaN(priceVal)&&priceVal>0)?priceVal:itemPrice(modalItem);

  // Add to history only if date is new
  const existing=state.dates[modalId];
  if(val!==existing){
    state.history.push({itemId:modalId,name:modalItem.name,cat:modalItem.cat,price:usedPrice,date:val});
  } else {
    // Update price in the latest history entry for this date
    const entry=state.history.find(h=>h.itemId===modalId&&h.date===val);
    if(entry)entry.price=usedPrice;
  }
  state.dates[modalId]=val;
  save();render();
  document.getElementById('overlay').classList.remove('open');
}

function addMisc(){
  const name=document.getElementById('misc-name').value.trim();
  const price=parseFloat(document.getElementById('misc-price').value);
  if(!name||isNaN(price)||price<=0)return;
  const cap=name.charAt(0).toUpperCase()+name.slice(1);
  state.misc.push({name:cap,price,checked:false});
  const today=new Date().toISOString().slice(0,10);
  state.history.push({itemId:null,name:cap,cat:'misc',price,date:today});
  document.getElementById('misc-name').value='';
  document.getElementById('misc-price').value='';
  save();render();
}
function removeMisc(e,idx){
  e.stopPropagation();
  state.misc.splice(idx,1);save();render();
}
function resetChecks(){
  if(!confirm('Reset all check-offs for this cycle?'))return;
  state.checked={};save();render();
}

function switchTab(tab){
  ['overview','orders','history'].forEach(t=>{
    document.getElementById('view-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  document.getElementById('history-controls').style.display=tab==='history'?'block':'none';
  document.getElementById('main-scroll').scrollTop=0;
}

function initChart(){
  if(state.chartOpen){
    document.getElementById('chart-body').classList.add('open');
    document.getElementById('chart-caret').classList.add('open');
  }
}

document.getElementById('month-label').textContent=new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
load();initChart();render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
